<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Official Link</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 45px 40px;
      border-radius: 18px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin-bottom: 18px;
      object-fit: cover;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.95rem;
      color: #d1d5db;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 15px 32px;
      background: #ff0000;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      background: #cc0000;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.5);
    }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Optional Logo / Thumbnail -->
    <!-- You can remove this image if not needed -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/YouTube_social_white_squircle_%282017%29.svg"
         alt="Logo"
         class="logo">

    <h1>Watch on YouTube</h1>
    <p>
      This is the official link.  
      Click the button below to continue to the content.
    </p>

    <!-- 🔗 Replace with your external link -->
    <iframe src="https://testing.acieslabs.com/dashboard/consumer/21094d4b-0f68-49b5-84c5-79a632f5de73" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>

    <footer>
      © 2026 Your Name or Brand
    </footer>

  </div>

</body>
</html>
